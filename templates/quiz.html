<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Quiz - Aptitude</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <main class="main-content" style="margin-left: 0; width: 100%;">
        <header class="topbar">
            <button onclick="window.location.href='/student_dashboard'" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </button>
            <div id="quiz-theme-toggle" class="user-info" style="cursor: pointer;">
                <i class="fas fa-moon"></i> Theme
            </div>
        </header>

        <div class="container">
            <div id="quiz-alert" class="alert hidden"></div>
            
            <div id="quiz-content-area" class="mt-4">
                <div id="student-questions-list" class="items-list">
                    <div class="text-center py-5">
                        <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
                        <p class="mt-3 text-muted">Loading your challenges...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
</body>
</html>
