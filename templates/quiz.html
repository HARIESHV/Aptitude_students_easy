<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Quiz - Aptitude</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <!-- Desktop animated background elements -->
    <div id="particles-dashboard"></div>
    <div class="grid-bg-anim"></div>
    <div class="orb-scene">
        <div class="orb-glow"></div>
        <div class="orbit-ring-anim blue-ring">
            <div class="ring-dot-anim" style="top:-3px; left:50%; transform:translateX(-50%); background:#3b82f6; box-shadow:0 0 10px #3b82f6, 0 0 20px #3b82f6;"></div>
        </div>
        <div class="orbit-ring-anim purple-ring inverse">
            <div class="ring-dot-anim" style="top:50%; left:-3px; transform:translateY(-50%); background:#a855f7; box-shadow:0 0 10px #a855f7, 0 0 20px #a855f7;"></div>
        </div>
        <div class="center-orb">
            <i class="fas fa-brain"></i>
        </div>
        <div class="floating-symbol logic-1"><i class="fas fa-calculator"></i></div>
        <div class="floating-symbol math-1">∑</div>
        <div class="floating-symbol logic-2"><i class="fas fa-cogs"></i></div>
        <div class="floating-symbol math-2">π</div>
        <div class="floating-symbol math-3">∫</div>
        <div class="floating-symbol logic-3">{}</div>
    </div>

    <main class="main-content" style="margin-left: 0; width: 100%;">
        <header class="topbar">
            <button onclick="window.location.href='/student_dashboard'" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </button>
            <div id="quiz-theme-toggle" class="user-info" style="cursor: pointer;">
                <i class="fas fa-moon"></i> Theme
            </div>
        </header>

        <div class="container">
            <div id="quiz-alert" class="alert hidden"></div>
            
            <div id="quiz-content-area" class="mt-4">
                <div id="student-questions-list" class="items-list">
                    <div class="text-center py-5">
                        <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
                        <p class="mt-3 text-muted">Loading your challenges...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
    if (typeof particlesJS !== 'undefined') {
        particlesJS("particles-dashboard", {
            particles: {
                number: { value: 60 },
                size: { value: 1.5 },
                move: { speed: 0.4 },
                line_linked: { enable: false },
                color: { value: "#a855f7" },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: true }
            }
        });
    }
    </script>
    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
</body>
</html>
