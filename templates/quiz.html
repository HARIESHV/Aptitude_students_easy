<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment - AptitudeLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        #three-bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: #f8fafc;
        }
        
        .dark-mode #three-bg-container { background: #020617; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .dark-mode .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.05);
        }

        /* Option Glowing States */
        .q-option-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            cursor: pointer;
        }

        .q-option-card:hover {
            background: rgba(99, 102, 241, 0.05);
            border-color: #6366f1;
            transform: scale(1.02);
        }

        .selected {
            background: rgba(99, 102, 241, 0.1) !important;
            border-color: #6366f1 !important;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .correct {
            background: rgba(34, 197, 94, 0.1) !important;
            border-color: #22c55e !important;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
            color: #166534;
        }

        .incorrect {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
            color: #991b1b;
        }

        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #e2e8f0;
            transition: all 0.3s;
        }
        .dot.active { background: #6366f1; width: 24px; border-radius: 10px; }

        /* Select & Option Styling - Global */
        select option {
            background-color: white;
            color: #1a1a1a;
        }
        .dark-mode select option {
            background-color: #0f172a;
            color: white;
        }
        select { color: #1a1a1a; }
        .dark-mode select { color: white; }

        /* Alerts */
        .alert {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 700;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            animation: slideDown 0.3s ease-out;
        }
        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .dark-mode .alert-success {
            background: #064e3b;
            color: #d1fae5;
            border-color: #065f46;
        }
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .dark-mode .alert-error {
            background: #7f1d1d;
            color: #fee2e2;
            border-color: #991b1b;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @media (max-width: 1023px) {
            #mobile-block { display: flex; }
            #quiz-layout { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- Mobile Block -->
    <div id="mobile-block" class="fixed inset-0 z-[9999] hidden flex-col items-center justify-center bg-slate-900 text-white p-8 text-center">
        <i class="fas fa-laptop text-6xl mb-6 text-indigo-400"></i>
        <h1 class="text-2xl font-bold mb-2">Desktop Only Assessment</h1>
        <p class="text-slate-400">Please complete your test on a laptop or desktop.</p>
    </div>

    <!-- Three.js Background -->
    <div id="three-bg-container"></div>

    <div id="quiz-layout" class="relative z-10 flex flex-col min-h-screen">
        
        <!-- Top Nav -->
        <header class="h-24 px-12 flex items-center justify-between sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-black/5 dark:border-white/5">
            <button onclick="window.location.href='/student_dashboard'" class="flex items-center gap-3 px-6 py-3 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                <i class="fas fa-arrow-left"></i> Exit to Dashboard
            </button>
            <div class="flex items-center gap-6">
                <button id="quiz-theme-toggle" class="w-12 h-12 rounded-2xl border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center p-12">
            <div class="w-full max-w-4xl">
                <div id="quiz-alert" class="hidden mb-8 px-6 py-4 rounded-2xl font-bold"></div>
                
                <div id="student-questions-list" class="space-y-12">
                     <div class="text-center py-20 space-y-6">
                        <div class="w-20 h-20 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        <p class="text-xl font-bold font-orbitron text-indigo-600">Initializing Assessment...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/three-background.js') }}"></script>
    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
</body>
</html>
