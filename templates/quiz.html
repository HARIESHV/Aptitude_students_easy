<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment - AptitudeLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        #three-bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: #f8fafc;
        }

        /* ─── MOVING GRID ─────────────────────────────── */
        @keyframes gridWave {
          0%{ transform: perspective(600px) rotateX(60deg) translateY(0px); }
          50%{ transform: perspective(600px) rotateX(60deg) translateY(-10px); }
          100%{ transform: perspective(600px) rotateX(60deg) translateY(0px); }
        }

        @keyframes gridMove {
            0%   { background-position: 0 0; }
            100% { background-position: 0 -60px; }
        }

        .grid-bg {
            position: fixed;
            bottom: 0; left: -200px;
            width: calc(100% + 400px);
            height: 55vh;
            background-image:
                linear-gradient(rgba(99,102,241,0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.2) 1px, transparent 1px);
            background-size: 60px 60px;
            transform-origin: bottom center;
            animation: gridMove 15s linear infinite, gridWave 8s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }
        .grid-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #020617 0%, transparent 60%);
            transition: background 0.5s ease;
        }
        html:not(.dark) .grid-bg::after {
            background: linear-gradient(to top, #f8fafc 0%, transparent 60%);
        }
        html:not(.dark) .grid-bg {
            background-image:
                linear-gradient(rgba(99,102,241,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.1) 1px, transparent 1px);
        }
        
        .dark-mode #three-bg-container { background: #020617; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .dark-mode .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.05);
        }

        /* Option Glowing States & Refined Interaction */
        .q-option-card {
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.02);
        }
        .dark-mode .q-option-card {
            background: rgba(15, 23, 42, 0.4);
            border-color: rgba(255, 255, 255, 0.02);
        }

        .q-option-card:hover {
            transform: translateY(-4px) scale(1.01);
            background: rgba(99, 102, 241, 0.03);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 10px 25px -10px rgba(99, 102, 241, 0.15);
        }

        .selected {
            background: rgba(99, 102, 241, 0.08) !important;
            border-color: #6366f1 !important;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.15);
        }
        .selected .opt-letter {
            background: #6366f1 !important;
            color: white !important;
        }

        .correct {
            background: rgba(16, 185, 129, 0.1) !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 35px rgba(16, 185, 129, 0.2);
        }
        .correct .opt-letter {
            background: #10b981 !important;
            color: white !important;
        }

        .incorrect {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 35px rgba(239, 68, 68, 0.2);
        }
        .incorrect .opt-letter {
            background: #ef4444 !important;
            color: white !important;
        }

        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #e2e8f0;
            transition: all 0.3s;
        }
        .dot.active { background: #6366f1; width: 24px; border-radius: 10px; }

        /* Select & Option Styling - Global */
        select option {
            background-color: white;
            color: #1a1a1a;
        }
        .dark-mode select option {
            background-color: #0f172a;
            color: white;
        }
        select { color: #1a1a1a; }
        .dark-mode select { color: white; }

        /* Alerts */
        .alert {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 1rem 2rem;
            border-radius: 1rem;
            font-weight: 700;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            animation: slideDown 0.3s ease-out;
        }
        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .dark-mode .alert-success {
            background: #064e3b;
            color: #d1fae5;
            border-color: #065f46;
        }
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .dark-mode .alert-error {
            background: #7f1d1d;
            color: #fee2e2;
            border-color: #991b1b;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* Quiz unblocked on mobile */
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- Quiz unblocked -->

    <!-- Three.js Background -->
    <div id="three-bg-container"></div>
    <div class="grid-bg"></div>

    <div id="quiz-layout" class="relative z-10 flex flex-col min-h-screen">
        
        <!-- Top Nav -->
        <header class="h-20 md:h-24 px-4 md:px-12 flex items-center justify-between sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-black/5 dark:border-white/5 mx-auto w-full md:max-w-none">
            <button onclick="window.location.href='/student_dashboard'" class="flex items-center gap-2 md:gap-3 px-4 md:px-6 py-2.5 md:py-3 bg-white dark:bg-slate-900 rounded-xl md:rounded-2xl border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-sm md:text-base">
                <i class="fas fa-arrow-left"></i> <span class="hidden md:inline">Exit to</span> Dashboard
            </button>
            <div class="flex items-center gap-4 md:gap-6">
                <button id="quiz-theme-toggle" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-start md:justify-center p-4 md:p-12 w-full md:max-w-none mx-auto pb-10">
            <div class="w-full max-w-4xl">
                <div id="quiz-alert" class="hidden mb-8 px-6 py-4 rounded-2xl font-bold"></div>
                
                <div id="student-questions-list" class="space-y-12">
                     <div class="text-center py-20 space-y-6">
                        <div class="w-20 h-20 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        <p class="text-xl font-bold font-orbitron text-indigo-600">Initializing Assessment...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/three-background.js') }}"></script>
    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
</body>
</html>
