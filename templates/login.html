<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AptitudeLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        #three-bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: #f8fafc;
        }
        
        .dark-mode #three-bg-container { background: #020617; }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .dark-mode .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .role-btn.active {
            background: #6366f1;
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .input-group i {
            transition: color 0.3s;
        }
        .input-group:focus-within i {
            color: #6366f1;
        }

        @media (max-width: 1023px) {
            #mobile-block { display: flex; }
            #login-container { display: none; }
        }

        /* Select & Option Styling - Global */
        select option {
            background-color: white;
            color: #1a1a1a;
        }

        .dark-mode select option {
            background-color: #0f172a;
            color: white;
        }

        select {
            color: #1a1a1a;
        }

        .dark-mode select {
            color: white;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 flex items-center justify-center min-h-screen">

    <!-- Mobile Screen Blocker -->
    <div id="mobile-block" class="fixed inset-0 z-[9999] hidden flex-col items-center justify-center bg-slate-900 text-white p-8 text-center">
        <i class="fas fa-laptop text-6xl mb-6 text-indigo-400"></i>
        <h1 class="text-2xl font-bold mb-2">Desktop Only</h1>
        <p class="text-slate-400">Please access AptitudeLab on a laptop or desktop.</p>
    </div>

    <!-- Three.js BG -->
    <div id="three-bg-container"></div>

    <div id="login-container" class="relative z-10 w-full max-w-lg px-6">
        
        <!-- Back to Home -->
        <a href="/" class="absolute -top-16 left-0 flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-all font-bold group">
            <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Back to Home
        </a>

        <!-- Auth Card -->
        <div class="glass-card rounded-[2.5rem] p-12 space-y-8">
            <div class="text-center space-y-4">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-xl shadow-indigo-600/30">
                    <i class="fas fa-brain text-white text-3xl"></i>
                </div>
                <h1 class="font-orbitron text-3xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">Aptitude<span class="text-slate-900 dark:text-white">Lab</span></h1>
                <p class="text-slate-500 font-medium">Elevate your logical precision.</p>
            </div>

            <div class="flex p-1.5 bg-slate-100 dark:bg-slate-800/50 rounded-2xl border border-black/5 dark:border-white/5">
                <button id="btn-show-student" class="role-btn active flex-1 py-3.5 rounded-xl font-bold text-sm transition-all">Student</button>
                <button id="btn-show-admin" class="role-btn flex-1 py-3.5 rounded-xl font-bold text-sm transition-all text-slate-500">Administrator</button>
            </div>

            <div id="auth-forms">
                <!-- Login Form -->
                <form id="login-form" class="space-y-6">
                    <div class="space-y-4">
                        <div class="input-group relative">
                            <i class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="login-username" placeholder="Username" required class="w-full pl-14 pr-6 py-4 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium text-slate-900 dark:text-white">
                        </div>
                        <div class="input-group relative">
                            <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="login-password" placeholder="Password" required class="w-full pl-14 pr-6 py-4 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium text-slate-900 dark:text-white">
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full py-5 bg-slate-900 dark:bg-indigo-600 text-white rounded-2xl font-bold shadow-2xl shadow-indigo-600/20 hover:scale-[1.02] active:scale-95 transition-all">
                        Login As <span id="login-role-text">Student</span>
                    </button>
                    
                    <p class="text-center text-sm text-slate-500 font-medium">
                        Don't have an account? <span class="text-indigo-600 cursor-pointer font-bold hover:underline" id="to-register">Create one now</span>
                    </p>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="hidden space-y-6">
                    <div class="space-y-4">
                        <div class="input-group relative">
                            <i class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="reg-username" placeholder="Choose Username" required class="w-full pl-14 pr-6 py-4 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium text-slate-900 dark:text-white">
                        </div>
                        <div class="input-group relative">
                            <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="reg-password" placeholder="Create Password" required class="w-full pl-14 pr-6 py-4 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium text-slate-900 dark:text-white">
                        </div>
                    </div>
                    <button type="submit" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-2xl shadow-indigo-600/20 hover:scale-[1.02] active:scale-95 transition-all">
                        Register Account
                    </button>
                    <p class="text-center text-sm text-slate-500 font-medium">
                        Already a member? <span class="text-indigo-600 cursor-pointer font-bold hover:underline" id="to-login">Login here</span>
                    </p>
                </form>
            </div>

            <div id="auth-alert" class="hidden px-6 py-4 rounded-2xl text-sm font-bold text-center"></div>
        </div>
    </div>

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="fixed top-8 right-8 w-12 h-12 rounded-2xl glass-card flex items-center justify-center text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all z-50">
        <i class="fas fa-moon"></i>
    </button>

    <script src="{{ url_for('static', filename='js/three-background.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        // Custom role toggle logic for tailwind
        const studentBtn = document.getElementById('btn-show-student');
        const adminBtn = document.getElementById('btn-show-admin');
        const roleText = document.getElementById('login-role-text');

        studentBtn.addEventListener('click', () => {
            studentBtn.classList.add('active');
            studentBtn.classList.remove('text-slate-500');
            adminBtn.classList.remove('active');
            adminBtn.classList.add('text-slate-500');
            roleText.innerText = 'Student';
        });

        adminBtn.addEventListener('click', () => {
            adminBtn.classList.add('active');
            adminBtn.classList.remove('text-slate-500');
            studentBtn.classList.remove('active');
            studentBtn.classList.add('text-slate-500');
            roleText.innerText = 'Administrator';
        });
    </script>
</body>
</html>
