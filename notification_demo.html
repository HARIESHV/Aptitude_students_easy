<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Notification Sounds</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        h1 { font-weight: 600; margin-bottom: 8px; }
        p { color: var(--text-dim); margin-bottom: 32px; font-size: 0.95rem; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }
        .btn:active { transform: translateY(0); }

        .btn.secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); }
        .btn.secondary:hover { background: rgba(255, 255, 255, 0.15); }

        .settings-bar {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary-light);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .mute-toggle {
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .mute-toggle:hover { background: rgba(255, 255, 255, 0.2); scale: 1.1; }
        .mute-toggle.muted { color: #f43f5e; background: rgba(244, 63, 94, 0.1); }

        /* Toast Styles */
        #toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(5px);
            border-left: 4px solid var(--primary);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show { transform: translateX(0); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SyncSound</h1>
        <p>Interactive notification feedback system</p>
        
        <div class="controls">
            <div class="sound-grid">
                <button class="btn" onclick="triggerEvent('message')">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                    New Message
                </button>
                <button class="btn" onclick="triggerEvent('alert')">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                    Security Alert
                </button>
                <button class="btn secondary" onclick="triggerEvent('success')">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    Success Task
                </button>
                <button class="btn secondary" onclick="triggerEvent('error')">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
                    System Error
                </button>
            </div>

            <div class="settings-bar">
                <div class="mute-toggle" id="muteToggle" onclick="toggleMute()" title="Mute/Unmute">
                    <svg id="vol-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </div>
                <div class="volume-control">
                    <input type="range" id="volumeSlider" min="0" max="100" value="70" oninput="updateVolume(this.value)">
                </div>
                <span id="vol-percent">70%</span>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;
        let globalVolume = 0.7;

        const sounds = {
            message: { freq: [523.25, 783.99], type: 'sine', duration: 0.15 },
            alert: { freq: [880, 440], type: 'square', duration: 0.3 },
            success: { freq: [440, 554.37, 659.25], type: 'sine', duration: 0.1 },
            error: { freq: [220, 110], type: 'sawtooth', duration: 0.4 }
        };

        function playSound(type) {
            if (isMuted) return;
            const config = sounds[type];
            if (!config) return;

            const now = audioCtx.currentTime;
            config.freq.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = config.type;
                osc.frequency.setValueAtTime(f, now + (i * 0.05));
                gain.gain.setValueAtTime(globalVolume * 0.5, now + (i * 0.05));
                gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.05) + config.duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (i * 0.05));
                osc.stop(now + (i * 0.05) + config.duration);
            });
        }

        function triggerEvent(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playSound(type);
            showNotification(type);
        }

        function showNotification(type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const messages = { message: 'New message received', alert: 'Security alert!', success: 'Action successful', error: 'Process failed' };
            const colors = { message: '#6366f1', alert: '#f59e0b', success: '#10b981', error: '#ef4444' };
            toast.style.borderLeftColor = colors[type];
            toast.innerHTML = `<span>${messages[type]}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteToggle').classList.toggle('muted', isMuted);
            document.getElementById('vol-icon').innerHTML = isMuted ? 
                '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>' : 
                '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
        }

        function updateVolume(val) {
            globalVolume = val / 100;
            document.getElementById('vol-percent').innerText = `${val}%`;
            if (val == 0 && !isMuted) toggleMute();
            else if (val > 0 && isMuted) toggleMute();
        }
    </script>
</body>
</html>
